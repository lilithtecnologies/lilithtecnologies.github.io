<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Trainer</title>

    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <div class="header-brand">
                <img src="assets/icon.png" alt="Block Trainer Logo" class="header-logo">
                <h1>Block Trainer</h1>
            </div>
        </div>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-view="workouts">
            <i data-lucide="dumbbell" style="width: 20px; height: 20px;"></i>
            <span>Entrenos</span>
        </button>

        <button class="nav-btn" data-view="stats">
            <i data-lucide="bar-chart-2" style="width: 20px; height: 20px;"></i>
            <span>Estadísticas</span>
        </button>
    </nav>

    <div id="modal-root"></div>
    <div id="toast-root" aria-live="polite"></div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/workouts.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
